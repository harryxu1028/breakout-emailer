name: Breakout Emailer

on:
  schedule:
    # 20:30 UTC = 4:30pm ET during daylight saving (3:30pm in winter —
    # change to '30 21 * * 1-5' after clocks fall back in November,
    # otherwise the run lands before the close and scans the prior day).
    - cron: '30 20 * * 1-5'
  workflow_dispatch: {}   # allows manual runs from the Actions tab

jobs:
  scan-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas matplotlib

      - name: Run breakout scan and email
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python breakout_emailer.py
